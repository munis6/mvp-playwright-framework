name: Playwright CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # future-proof against Node.js 20 deprecation

on:
  push:
    branches: [ "main" ]   # triggers only when code is merged/pushed to main

jobs:
  run-homepage-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run HomePage test
        run: npx playwright test src/steps/HomePage.ts --project=chromium
