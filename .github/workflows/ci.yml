name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  notify-push:
    runs-on: ubuntu-latest
    steps:
      - name: Send pre-push email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "New Push to Main"
          to: sekaredy@gmail.com   # <-- your lead/distribution list email(s)
          from: "GitHub Actions <noreply@github.com>"
          body: |
            A new push was triggered.
            Author: ${{ github.actor }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

  run-tests:
    runs-on: ubuntu-latest
    needs: notify-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Playwright tests
        run: npm test

      - name: Send post-execution email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "CI Results - Main"
          to: sekaredy@gmail.com   # <-- same email(s) here
          from: "GitHub Actions <noreply@github.com>"
          body: |
            CI run completed.
            Status: ${{ job.status }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Results: See attached logs/artifacts.
